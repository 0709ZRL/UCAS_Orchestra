<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>乐团管理平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f2f5;color:#333;min-height:100vh}
.header{background:#1a1a2e;color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.header h1{font-size:18px;font-weight:600;flex:1}
.header .env{font-size:11px;background:#e94560;padding:2px 10px;border-radius:10px;display:none}
.header .menu-btn{display:block;background:none;border:none;color:#fff;font-size:24px;cursor:pointer;padding:0 4px}
.header-right{display:flex;align-items:center;gap:12px;font-size:14px}
.header-right .user-name{cursor:pointer;position:relative}
.header-right .user-name .dropdown{display:none;position:absolute;top:100%;right:0;background:#fff;color:#333;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.15);min-width:120px;z-index:200;overflow:hidden}
.header-right .user-name .dropdown a{display:block;padding:10px 16px;text-decoration:none;color:#333;font-size:14px}
.header-right .user-name .dropdown a:hover{background:#f5f5f5;color:#e94560}
.header-right .user-name:hover .dropdown{display:block}
.container{display:flex;min-height:calc(100vh - 52px)}
.sidebar{width:200px;background:#16213e;flex-shrink:0;transition:transform .3s}
.sidebar a{display:block;padding:14px 20px;color:#a8b2d1;text-decoration:none;font-size:14px;border-left:3px solid transparent;transition:all .2s;cursor:pointer}
.sidebar a:hover,.sidebar a.active{background:#1a1a3e;color:#fff;border-left-color:#e94560}
.main{flex:1;padding:16px 20px;min-width:0;overflow-x:hidden}
.page{display:none}
.page.active{display:block}
/* === 登录/注册页 === */
.auth-page{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);padding:20px}
.auth-box{background:#fff;border-radius:16px;padding:36px 32px;width:420px;max-width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.auth-box h2{text-align:center;margin-bottom:24px;color:#1a1a2e;font-size:22px}
.auth-box .form-group{margin-bottom:14px}
.auth-box .form-group label{display:block;font-size:12px;color:#888;margin-bottom:4px}
.auth-box .form-group input,.auth-box .form-group select{width:100%;padding:10px 12px;border:1px solid #d9d9d9;border-radius:8px;font-size:14px;background:#fafafa}
.auth-box .form-group input:focus{border-color:#e94560;outline:none;background:#fff}
.auth-box .auth-btn{width:100%;padding:12px;border:none;border-radius:8px;font-size:16px;cursor:pointer;background:#e94560;color:#fff;margin-top:8px;font-weight:600}
.auth-box .auth-btn:hover{background:#c73650}
.auth-box .auth-link{text-align:center;margin-top:16px;font-size:14px;color:#666}
.auth-box .auth-link a{color:#e94560;text-decoration:none;cursor:pointer}
.auth-box .auth-link a:hover{text-decoration:underline}
.auth-box .toggle-row{display:flex;gap:8px;margin-bottom:14px}
.auth-box .toggle-row .form-group{flex:1;margin-bottom:0}
.auth-hidden{display:none}
/* ================ */
.toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.toolbar input,.toolbar select{padding:8px 12px;border:1px solid #d9d9d9;border-radius:6px;font-size:14px;background:#fff;max-width:180px}
.toolbar button,.btn{padding:8px 16px;border:none;border-radius:6px;font-size:14px;cursor:pointer;background:#e94560;color:#fff;transition:background .2s;white-space:nowrap}
.toolbar button:hover{background:#c73650}
.btn-secondary{background:#4a4a6a}
.btn-secondary:hover{background:#3a3a5a}
.btn-green{background:#2d8a4e}
.btn-green:hover{background:#23703f}
.table-wrap{overflow-x:auto;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
table{width:100%;border-collapse:collapse;background:#fff;min-width:600px}
th,td{text-align:left;padding:8px 10px;border-bottom:1px solid #f0f0f0;font-size:13px}
th{background:#fafafa;font-weight:600;color:#666;white-space:nowrap}
tr:hover{background:#f8f9ff}
.actions{display:flex;gap:4px;flex-wrap:nowrap}
.actions button{padding:4px 10px;border:none;border-radius:4px;cursor:pointer;font-size:12px;white-space:nowrap}
.btn-edit{background:#1890ff;color:#fff}
.btn-del{background:#ff4d4f;color:#fff}
.pagination{display:flex;justify-content:space-between;align-items:center;margin-top:12px;font-size:13px;color:#666;flex-wrap:wrap;gap:8px}
.pagination button{padding:4px 12px;border:1px solid #d9d9d9;border-radius:4px;background:#fff;cursor:pointer;font-size:13px}
.pagination button:disabled{opacity:.5;cursor:default}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:1000}
.modal-overlay.active{display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:12px;padding:24px;width:520px;max-width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 10px 40px rgba(0,0,0,.2)}
.modal h2{margin-bottom:16px;font-size:18px}
.form-row{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:12px}
.form-group{flex:1;min-width:160px}
.form-group label{display:block;font-size:12px;color:#888;margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 10px;border:1px solid #d9d9d9;border-radius:6px;font-size:14px}
.form-group textarea{resize:vertical;min-height:60px}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;flex-wrap:wrap}
.form-actions button{padding:8px 20px;border:none;border-radius:6px;cursor:pointer;font-size:14px}
.btn-cancel{background:#f0f0f0;color:#333}
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:8px;color:#fff;font-size:14px;z-index:2000;animation:slideIn .3s;max-width:calc(100vw-40px)}
.toast.success{background:#2d8a4e}
.toast.error{background:#e94560}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.lightbox-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.9);z-index:3000;justify-content:center;align-items:center}
.lightbox-overlay.active{display:flex}
.lightbox-img{max-width:92vw;max-height:92vh;object-fit:contain;border-radius:4px}
.lightbox-close{position:absolute;top:12px;right:16px;font-size:36px;color:#fff;cursor:pointer;font-weight:700;line-height:1;z-index:3001}
.lightbox-close:hover{color:#e94560}

/* 响应式：平板及以下 */
@media(max-width:900px){
  .sidebar{position:fixed;top:52px;left:0;bottom:0;z-index:99;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{padding:12px}
  .toolbar input,.toolbar select{max-width:140px;font-size:13px}
  .modal{width:100%;border-radius:12px 12px 0 0;margin-top:auto;max-height:90vh}
  .modal-overlay.active{align-items:flex-end}
  .header .menu-btn{display:block}
}
@media(max-width:600px){
  .header h1{font-size:16px}
  .toolbar input,.toolbar select{max-width:100%;width:100%}
  .toolbar{flex-direction:column;align-items:stretch}
  .toolbar button{width:100%}
  .form-group{min-width:100%}
  .pagination{flex-direction:column;align-items:center}
  th,td{padding:6px 8px;font-size:12px}
  .sidebar a{padding:12px 16px;font-size:13px}
}
@media(min-width:901px){
  .header .menu-btn{display:none}
}
</style>
</head>
<body>
<div id="auth-page" class="auth-page"></div>
<div id="app" style="display:none">
<div class="header">
  <button class="menu-btn" onclick="toggleSidebar()">☰</button>
  <h1>🎵 乐团管理平台</h1>
  <span class="env">Orchestra v1.0</span>
  <div class="header-right">
    <div class="user-name" id="headerUser">用户 ▼
      <div class="dropdown"><a onclick="logout()">🚪 退出登录</a></div>
    </div>
  </div>
</div>
<div class="container">
  <nav class="sidebar">
    <a href="#" data-page="persons" class="active">👤 成员管理</a>
    <a href="#" data-page="events">📅 活动管理</a>
    <a href="#" data-page="attendance">📋 出勤管理</a>
    <a href="#" data-page="scores">🎼 乐谱管理</a>
    <a href="#" data-page="logistics">📦 后勤管理</a>
  </nav>
  <div class="main">
    <!-- Persons -->
    <div id="page-persons" class="page active"></div>
    <!-- Events -->
    <div id="page-events" class="page"></div>
    <!-- Attendance -->
    <div id="page-attendance" class="page"></div>
    <!-- Scores -->
    <div id="page-scores" class="page"></div>
    <!-- Logistics -->
    <div id="page-logistics" class="page"></div>
  </div>
</div>
</div>
<div id="modal" class="modal-overlay"><div class="modal" id="modalBody"></div></div>
<div id="lightbox" class="lightbox-overlay" onclick="closeLightbox()">
  <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
  <img class="lightbox-img" id="lightboxImg" src="" alt="大图预览">
</div>
<div id="toast"></div>

<script>
const API = '/api';
const state = { persons:{page:1}, events:{page:1}, attendance:{page:1}, scores:{page:1}, logistics:{page:1} };

// 全局联动函数
function toggleManagerJob(){
  const el=document.getElementById('f-isManager');
  const row=document.getElementById('fg-managerJob');
  if(el&&row)row.style.display=el.value==='1'?'':'none';
}
function toggleOwner(){
  const el=document.getElementById('f-isPublic');
  const row=document.getElementById('fg-belongsToId');
  if(el&&row)row.style.display=el.value==='0'?'':'none';
}
function syncEndTimeMin(){
  const st=document.getElementById('f-startTime');
  const et=document.getElementById('f-endTime');
  if(st&&et){et.min=st.value;}
}
function openLightbox(url){
  document.getElementById('lightboxImg').src=url;
  document.getElementById('lightbox').classList.add('active');
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('active');
  document.getElementById('lightboxImg').src='';
}
function toggleSidebar(){
  document.querySelector('.sidebar').classList.toggle('open');
}
// 点击主区域关闭侧栏（移动端）
document.addEventListener('DOMContentLoaded',()=>{
  document.querySelector('.main')?.addEventListener('click',()=>{
    if(window.innerWidth<=900)document.querySelector('.sidebar')?.classList.remove('open');
  });
  checkAuth();
});

// === 认证系统 ===
const REG_FIELDS = [
  { key:'account', label:'账号', required:true },
  { key:'password', label:'密码', type:'password', required:true },
  { key:'name', label:'真实姓名', required:true },
  { key:'gender', label:'性别', type:'select', options:[{v:0,t:'女'},{v:1,t:'男'}], default:0 },
  { key:'institute', label:'学院' },
  { key:'grade', label:'年级' },
  { key:'campus', label:'校区', type:'select', options:[{v:0,t:'中关村校区'},{v:1,t:'玉泉路校区'},{v:3,t:'雁栖湖校区'},{v:4,t:'京内其他地区'},{v:5,t:'京外其他地区'}], default:0 },
  { key:'section', label:'声部', type:'select', options:[{v:0,t:'民族管乐声部'},{v:1,t:'弹拨一组'},{v:2,t:'弹拨二组'},{v:3,t:'胡琴声部'},{v:4,t:'提琴声部'},{v:5,t:'西洋木管声部'},{v:6,t:'西洋铜管声部'},{v:7,t:'低音声部'},{v:8,t:'钢琴声部'},{v:9,t:'打击声部'},{v:10,t:'无声部'}], default:0 },
  { key:'job', label:'职位', type:'select', options:[{v:0,t:'普通成员'},{v:1,t:'声部长'}], default:0 },
  { key:'isManager', label:'是否管理人员', type:'select', options:[{v:0,t:'否'},{v:1,t:'是'}], default:0 },
  { key:'managerJob', label:'管理职责', type:'select', options:[{v:0,t:'普通干事'},{v:1,t:'团长'},{v:2,t:'业务副团长'},{v:3,t:'人事副团长'},{v:4,t:'后勤组组长'},{v:5,t:'宣传组组长'},{v:6,t:'学生指挥'},{v:7,t:'指挥助理'},{v:8,t:'指挥'}], default:0 },
  { key:'instrument', label:'乐器（多个用分号分隔）' },
  { key:'isMaster', label:'声部首席', type:'select', options:[{v:0,t:'否'},{v:1,t:'是'}], default:0 }
];

function showLogin(){
  const el=document.getElementById('auth-page');
  el.style.display='flex';
  document.getElementById('app').style.display='none';
  let h=`<div class="auth-box"><h2>🎵 乐团管理系统</h2>
    <form id="authForm">
      <div class="form-group"><label>账号</label><input id="loginAccount" type="text" placeholder="请输入账号"></div>
      <div class="form-group"><label>密码</label><input id="loginPassword" type="password" placeholder="请输入密码"></div>
    </form>
    <button class="auth-btn" onclick="doLogin()">登 录</button>
    <div class="auth-link">还没有账号？<a onclick="showRegister()">立即注册</a></div>
    <div id="authErr" style="color:#e94560;text-align:center;margin-top:12px;font-size:14px"></div></div>`;
  el.innerHTML=h;
}
function showRegister(){
  const el=document.getElementById('auth-page');
  let h=`<div class="auth-box"><h2>🎵 注册新账号</h2>
    <form id="authForm">`;
  REG_FIELDS.forEach((f,i)=>{
    const inp=f.type==='select'?`<select id="reg-${f.key}">${f.options.map(o=>`<option value="${o.v}" ${f.default===o.v?'selected':''}>${o.t}</option>`).join('')}</select>`:
      `<input id="reg-${f.key}" type="${f.type||'text'}" ${f.required?'required':''} placeholder="请输入${f.label}">`;
    h+=`<div class="form-group"><label>${f.label}${f.required?' *':''}</label>${inp}</div>`;
  });
  // 管理职责联动脚本
  h+=`<script>document.getElementById('reg-isManager')?.addEventListener('change',function(){
    const r=document.getElementById('reg-managerJob')?.closest('.form-group');
    if(r)r.style.display=this.value==='1'?'':'none';
  });
  const mgr=document.getElementById('reg-isManager');
  if(mgr){const e=new Event('change');mgr.dispatchEvent(e);}<\/script>`;
  h+=`</form>
    <button class="auth-btn" onclick="doRegister()">注 册</button>
    <div class="auth-link">已有账号？<a onclick="showLogin()">返回登录</a></div>
    <div id="authErr" style="color:#e94560;text-align:center;margin-top:12px;font-size:14px"></div></div>`;
  el.innerHTML=h;
}

async function doLogin(){
  const account=document.getElementById('loginAccount').value.trim();
  const password=document.getElementById('loginPassword').value;
  if(!account||!password){document.getElementById('authErr').textContent='请填写账号和密码';return;}
  const res=await api('/auth/login',{method:'POST',body:JSON.stringify({account,password})});
  if(res.success){afterLogin(res.name);}
  else document.getElementById('authErr').textContent=res.message;
}
async function doRegister(){
  const body={};
  REG_FIELDS.forEach(f=>{
    const el=document.getElementById('reg-'+f.key);
    if(!el)return;
    const val=el.value;
    if(f.required&&!val){document.getElementById('authErr').textContent='请填写所有必填项';return;}
    if(f.type==='select'||['gender','campus','section','job','isManager','managerJob','isMaster'].includes(f.key))
      body[f.key]=parseInt(val||0);
    else body[f.key]=val||null;
  });
  if(!body.account||!body.password||!body.name){document.getElementById('authErr').textContent='账号、密码、姓名为必填项';return;}
  const res=await api('/auth/register',{method:'POST',body:JSON.stringify(body)});
  if(res.success){afterLogin(res.name);}
  else document.getElementById('authErr').textContent=res.message;
}
function afterLogin(name){
  document.getElementById('headerUser').childNodes[0].textContent=name+' ▼';
  document.getElementById('auth-page').style.display='none';
  document.getElementById('app').style.display='block';
  // 重新加载当前页面
  const active=document.querySelector('.page.active');
  if(active)loadPage(active.id.replace('page-',''));
  else loadPage('persons');
}
async function checkAuth(){
  const res=await api('/auth/me');
  if(res.success){afterLogin(res.data.name);}
  else showLogin();
}
async function logout(){
  await api('/auth/logout',{method:'POST'});
  document.getElementById('app').style.display='none';
  showLogin();
}

// === 出勤管理：查找确认 ===
let _attLookupState={};
async function attLookup(){
  const pn=document.getElementById('f-personName').value.trim();
  const et=document.getElementById('f-eventTitle').value.trim();
  if(!pn&&!et){showToast('请至少填写成员姓名或活动标题','error');return;}
  const body={};
  if(pn)body.personName=pn;
  if(et)body.eventTitle=et;
  const res=await api('/attendance/lookup',{method:'POST',body:JSON.stringify(body)});
  if(!res.success){showToast('查询失败','error');return;}
  const el=document.getElementById('att-lookup-result');
  const cf=document.getElementById('att-confirmed');
  let html='';
  // 处理人员
  let personId=null,personLabel='';
  if(res.person){
    personId=res.person.personalId;
    personLabel=`${res.person.name} (${res.person.section||'?'})`;
  } else if(res.personOptions&&res.personOptions.length>0){
    if(res.personOptions.length===1){
      personId=res.personOptions[0].personalId;
      personLabel=`${res.personOptions[0].name} (${res.personOptions[0].section||'?'})`;
    } else {
      html+=`<div style="background:#fff3cd;padding:8px 12px;border-radius:6px;margin-bottom:8px"><b>⚠ 找到多位成员：</b></div>`;
      res.personOptions.forEach(p=>{
        html+=`<label style="display:block;padding:6px 10px;background:#f8f9ff;border-radius:4px;margin-bottom:4px;cursor:pointer">
          <input type="radio" name="att-pick-person" value="${p.personalId}" data-label="${p.name}(${p.section||'?'})"> ${p.name} (${p.section||'无声部'}) ${p.campus||''}
        </label>`;
      });
    }
  } else {
    html+=`<div style="background:#f8d7da;padding:8px 12px;border-radius:6px;margin-bottom:8px">❌ 未找到匹配的成员</div>`;
  }
  // 处理活动
  let eventId=null,eventLabel='';
  if(res.event){
    eventId=res.event.eventId;
    eventLabel=`${res.event.title} (${res.event.year}-${res.event.month}-${res.event.date})`;
  } else if(res.eventOptions&&res.eventOptions.length>0){
    if(res.eventOptions.length===1){
      eventId=res.eventOptions[0].eventId;
      eventLabel=`${res.eventOptions[0].title} (${res.eventOptions[0].year}-${res.eventOptions[0].month}-${res.eventOptions[0].date})`;
    } else {
      html+=`<div style="background:#fff3cd;padding:8px 12px;border-radius:6px;margin-bottom:8px"><b>⚠ 找到多项活动：</b></div>`;
      res.eventOptions.forEach(e=>{
        const st=e.startTime?e.startTime.replace('T',' ').substring(0,16):'';
        html+=`<label style="display:block;padding:6px 10px;background:#f8f9ff;border-radius:4px;margin-bottom:4px;cursor:pointer">
          <input type="radio" name="att-pick-event" value="${e.eventId}" data-label="${e.title}(${e.year}-${e.month}-${e.date})"> ${e.title} ${st} ${e.year}-${e.month}-${e.date}
        </label>`;
      });
    }
  } else {
    html+=`<div style="background:#f8d7da;padding:8px 12px;border-radius:6px;margin-bottom:8px">❌ 未找到匹配的活动</div>`;
  }
  // 确认按钮
  const needPick=!personId||!eventId||html.includes('radio');
  if(needPick&&(res.personOptions||res.eventOptions)){
    html+=`<button class="btn-green" onclick="attConfirmPick()">✅ 确认选择</button>`;
  }
  el.innerHTML=html;
  // 如果唯一，直接填入确认区
  if(!needPick){
    if(personId){
      document.getElementById('f-personalId').value=personId;
      document.getElementById('f-personDisplay').value=personLabel;
    }
    if(eventId){
      document.getElementById('f-eventId').value=eventId;
      document.getElementById('f-eventDisplay').value=eventLabel;
    }
    cf.style.display='block';
    _attLookupState={};
  } else {
    cf.style.display='none';
    _attLookupState={personId,eventId,personLabel,eventLabel,needPick};
  }
}
function attConfirmPick(){
  const pSel=document.querySelector('input[name="att-pick-person"]:checked');
  const eSel=document.querySelector('input[name="att-pick-event"]:checked');
  const cf=document.getElementById('att-confirmed');
  if(_attLookupState.personId||pSel){
    const pid=_attLookupState.personId||pSel.value;
    const plab=_attLookupState.personLabel||(pSel?pSel.dataset.label:'');
    document.getElementById('f-personalId').value=pid;
    document.getElementById('f-personDisplay').value=plab;
  }
  if(_attLookupState.eventId||eSel){
    const eid=_attLookupState.eventId||eSel.value;
    const elab=_attLookupState.eventLabel||(eSel?eSel.dataset.label:'');
    document.getElementById('f-eventId').value=eid;
    document.getElementById('f-eventDisplay').value=elab;
  }
  cf.style.display='block';
  document.getElementById('att-lookup-result').innerHTML='<div style="color:#2d8a4e">✅ 已确认</div>';
  _attLookupState={};
}
async function attSubmit(){
  const pid=document.getElementById('f-personalId').value;
  const eid=document.getElementById('f-eventId').value;
  if(!pid||!eid){showToast('请先通过查找确认成员和活动','error');return;}
  const method=parseInt(document.getElementById('f-method').value);
  const res=await api('/attendance',{method:'POST',body:JSON.stringify({personalId:pid,eventId:eid,method})});
  if(res.success){showToast('签到成功');closeModal();loadPage('attendance');}
  else showToast(res.message,'error');
}

function $(s){return document.querySelector(s)}
function $$(s){return document.querySelectorAll(s)}

function showToast(msg,type='success'){
  const t=$('#toast');t.innerHTML=`<div class="toast ${type}">${msg}</div>`;
  setTimeout(()=>t.innerHTML='',3000);
}

function openModal(html){$('#modal').classList.add('active');$('#modalBody').innerHTML=html}
function closeModal(){$('#modal').classList.remove('active')}
$('#modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()});

// Navigation
$$('.sidebar a').forEach(a=>a.addEventListener('click',e=>{
  e.preventDefault();
  $$('.sidebar a').forEach(x=>x.classList.remove('active'));
  a.classList.add('active');
  const page=a.dataset.page;
  $$('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  loadPage(page);
}));

async function api(path,opts={}){
  const r=await fetch(API+path,{headers:{'Content-Type':'application/json'},...opts});
  return r.json();
}

function buildToolbar(page,searchFields){
  let html='<div class="toolbar">';
  searchFields.forEach(f=>{
    if(f.type==='select'){
      html+=`<select id="sf-${page}-${f.key}" onchange="loadPage('${page}')"><option value="">${f.label}</option>`;
      f.options.forEach(o=>html+=`<option value="${o.v}">${o.t}</option>`);
      html+=`</select>`;
    } else {
      html+=`<input id="sf-${page}-${f.key}" placeholder="${f.label}" onkeydown="if(event.key==='Enter')loadPage('${page}')">`;
    }
  });
  html+=`<button onclick="loadPage('${page}')">🔍 搜索</button>`;
  html+=`<button class="btn-green" onclick="showForm('${page}')">＋ 新增</button>`;
  html+=`</div>`;
  return html;
}

function buildTable(data,columns,fieldLookup){
  if(!data||!data.length)return'<p style="padding:20px;text-align:center;color:#999">暂无数据</p>';
  let html='<table><tr>'+columns.map(c=>`<th>${c.label}</th>`).join('')+'<th>操作</th></tr>';
  data.forEach(row=>{
    html+='<tr>'+columns.map(c=>{
      // 支持自定义渲染函数
      if(c.render)return `<td>${c.render(row,fieldLookup)}</td>`;
      let v=row[c.key];if(v===null||v===undefined)v='';
      if(c.key==='isTotal')v=v==1?'总谱':'分谱';
      if(c.key==='isPublic')v=v==1?'公用':'私有';
      // 数值字段转标签
      if(fieldLookup && fieldLookup[c.key]){
        const opt=fieldLookup[c.key].find(o=>String(o.v)===String(v));
        if(opt)v=opt.t;
      }
      return `<td>${v}</td>`;
    }).join('')+`<td class="actions">
      <button class="btn-edit" onclick="showForm('${columns[0]._page}',${JSON.stringify(row).replace(/"/g,"'")})">编辑</button>
      <button class="btn-del" onclick="delRow('${columns[0]._page}','${row[columns.find(c=>c._id).key]}')">删除</button>
    </td></tr>`;
  });
  html+='</table>';
  return html;
}

function buildPagination(page,total,limit){
  const totalPages=Math.ceil(total/limit)||1;
  return `<div class="pagination"><span>共 ${total} 条</span>
    <div><button onclick="goPage('${page}',${state[page].page-1})" ${state[page].page<=1?'disabled':''}>上一页</button>
    <span style="margin:0 12px">${state[page].page}/${totalPages}</span>
    <button onclick="goPage('${page}',${state[page].page+1})" ${state[page].page>=totalPages?'disabled':''}>下一页</button></div></div>`;
}

function goPage(page,p){state[page].page=p;loadPage(page)}

async function loadPage(page){
  const el=document.getElementById('page-'+page);
  const search={};
  (fields[page]||[]).forEach(f=>{
    const inp=document.getElementById('sf-'+page+'-'+f.key);
    if(inp&&inp.value)search[f.key]=inp.value;
  });
  search.page=state[page].page;
  search.limit=20;
  const qs=Object.entries(search).map(([k,v])=>`${k}=${encodeURIComponent(v)}`).join('&');
  const res=await api('/'+page+'?'+qs);
  if(!res.success){el.innerHTML='<p>加载失败</p>';return;}

  let html='';
  const colMap={
    persons:[{key:'personalId',label:'用户ID'},{key:'name',label:'姓名'},{key:'gender',label:'性别'},{key:'section',label:'声部'},{key:'campus',label:'校区'},{key:'job',label:'职位'},{key:'isManager',label:'管理人员'},{key:'managerJob',label:'管理职务',render:(row,lu)=>row.isManager==1?(lu&&lu.managerJob?((lu.managerJob.find(o=>String(o.v)===String(row.managerJob))||{}).t||row.managerJob):row.managerJob):'无'},{key:'isMaster',label:'首席'}],
    events:[{key:'eventId',label:'活动ID'},{key:'startTime',label:'起始时间',render:(r)=>r.startTime?r.startTime.replace('T',' ').replace(/\.\d+Z$/,''):''},{key:'endTime',label:'结束时间',render:(r)=>r.endTime?r.endTime.replace('T',' ').replace(/\.\d+Z$/,''):''},{key:'title',label:'标题'}],
    attendance:[{key:'attendanceId',label:'ID'},{key:'personName',label:'成员'},{key:'eventTitle',label:'活动'},{key:'method',label:'方式',render:(r)=>r.method==1?'参加':'报名'}],
    scores:[{key:'scoreId',label:'ID'},{key:'title',label:'乐谱名'},{key:'isTotal',label:'类型'},{key:'section',label:'声部'},{key:'filehash',label:'PDF',render:(r)=>r.filehash?`<a href="/api/scores/${r.scoreId}/file" target="_blank" class="btn" style="padding:2px 10px;font-size:12px;background:#1890ff">📄 预览</a>`:'<span style="color:#999">无文件</span>'}],
    logistics:[{key:'itemId',label:'物品ID'},{key:'name',label:'物品名'},{key:'campus',label:'校区'},{key:'address',label:'位置'},{key:'isPublic',label:'状态'},{key:'belongsToId',label:'所属人'},{key:'imagehash',label:'图片',render:(r)=>r.imagehash?`<img src="/api/logistics/${r.itemId}/image" style="width:80px;height:80px;object-fit:cover;border-radius:6px;cursor:pointer" onclick="openLightbox('/api/logistics/${r.itemId}/image')" title="点击查看大图">`:'<span style="color:#999">无</span>'}]
  };
  const cols=colMap[page].map(c=>({...c,_page:page,_id:c.key===(page==='scores'?'scoreId':page==='logistics'?'itemId':page==='attendance'?'attendanceId':Object.keys(fields[page][0]?{personalId:''}:{})[0])}));
  cols[0]._id=true;

  const searchFields=page==='persons'?[{key:'name',label:'姓名'},{key:'section',label:'声部',type:'select',options:[{v:0,t:'民族管乐'},{v:1,t:'弹拨一组'},{v:2,t:'弹拨二组'},{v:3,t:'胡琴'},{v:4,t:'提琴'},{v:5,t:'西洋木管'},{v:6,t:'西洋铜管'},{v:7,t:'低音'},{v:8,t:'钢琴'},{v:9,t:'打击'},{v:10,t:'无声部'}]},{key:'campus',label:'校区',type:'select',options:[{v:0,t:'中关村'},{v:1,t:'玉泉路'},{v:3,t:'雁栖湖'},{v:4,t:'京内其他'},{v:5,t:'京外其他'}]},{key:'isManager',label:'管理人员',type:'select',options:[{v:0,t:'否'},{v:1,t:'是'}]},{key:'isMaster',label:'首席',type:'select',options:[{v:0,t:'否'},{v:1,t:'是'}]}]:
    page==='events'?[{key:'title',label:'标题'}]:
    page==='attendance'?[{key:'personalId',label:'用户ID'},{key:'eventId',label:'活动ID'}]:
    page==='scores'?[{key:'title',label:'乐谱名'},{key:'section',label:'声部'}] :
    [{key:'name',label:'物品名'},{key:'campus',label:'校区'}];

  // 为persons/logistics构建数值→标签映射
  let fieldLookup=null;
  const lookupPages={persons:true,logistics:true};
  if(lookupPages[page]){
    fieldLookup={};
    fields[page].forEach(f=>{
      if(f.options)fieldLookup[f.key]=f.options;
    });
  }

  html+=buildToolbar(page,searchFields);
  html+='<div class="table-wrap">' + buildTable(res.data,cols,fieldLookup) + '</div>';
  html+=buildPagination(page,res.total,res.limit);
  el.innerHTML=html;
}

function showForm(page,data){
  const isEdit=!!data;
  const flds=fields[page];

  // === 出勤管理：自定义表单（姓名/活动名搜索 → 确认 ID）===
  if(page==='attendance'){
    let h=`<h2>新增签到</h2><form id="form">
      <div class="form-row">
        <div class="form-group"><label>成员姓名 *</label><input id="f-personName" type="text" style="width:100%;padding:8px 10px;border:1px solid #d9d9d9;border-radius:6px;font-size:14px"></div>
        <div class="form-group"><label>活动标题 *</label><input id="f-eventTitle" type="text" style="width:100%;padding:8px 10px;border:1px solid #d9d9d9;border-radius:6px;font-size:14px"></div>
      </div>
      <div style="margin-bottom:12px"><button type="button" class="btn-green" onclick="attLookup()">🔍 查找确认</button></div>
      <div id="att-lookup-result" style="margin-bottom:12px"></div>
      <div id="att-confirmed" style="display:none">
        <div class="form-row">
          <div class="form-group"><label>成员（已确认）</label><input id="f-personDisplay" type="text" readonly style="background:#f5f5f5;width:100%;padding:8px 10px;border:1px solid #d9d9d9;border-radius:6px"></div>
          <div class="form-group"><label>活动（已确认）</label><input id="f-eventDisplay" type="text" readonly style="background:#f5f5f5;width:100%;padding:8px 10px;border:1px solid #d9d9d9;border-radius:6px"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>参加方式</label>
            <select id="f-method" style="width:100%;padding:8px 10px;border:1px solid #d9d9d9;border-radius:6px;font-size:14px">
              <option value="0">报名</option><option value="1">参加</option>
            </select>
          </div>
        </div>
      </div>
      <input id="f-personalId" type="hidden"><input id="f-eventId" type="hidden">
    </form><div class="form-actions">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-green" onclick="attSubmit()">创建</button>
    </div>`;
    openModal(h);
    return;
  }
  let html=`<h2>${isEdit?'编辑':'新增'}${ {'persons':'成员','events':'活动','attendance':'出勤','scores':'乐谱','logistics':'物品'}[page] }</h2><form id="form">`;
  let rows=[];
  // 动态默认值：新增活动时
  let nowStr='',now3hStr='';
  if(page==='events'&&!isEdit){
    const now=new Date();
    const pad=n=>String(n).padStart(2,'0');
    nowStr=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;
    const n3=new Date(now.getTime()+3*3600000);
    now3hStr=`${n3.getFullYear()}-${pad(n3.getMonth()+1)}-${pad(n3.getDate())}T${pad(n3.getHours())}:${pad(n3.getMinutes())}`;
  }
  // 收集需要联动的字段，打开弹窗后激活
  let toggleAfterOpen=null;
  if(page==='persons')toggleAfterOpen='toggleManagerJob';
  else if(page==='logistics')toggleAfterOpen='toggleOwner';
  else if(page==='events')toggleAfterOpen='syncEndTimeMin';
  flds.forEach((f,i)=>{
    // 新增时跳过 eventId（自动生成）
    if(!isEdit && f.readonly) return;
    let defaultVal=f.default!==undefined?f.default:'';
    // 活动动态默认值
    if(page==='events'&&!isEdit){
      if(f.key==='startTime')defaultVal=nowStr;
      if(f.key==='endTime')defaultVal=now3hStr;
      if(f.key==='title'&&!defaultVal)defaultVal='乐团活动';
    }
    const val=isEdit?data[f.key]:defaultVal;
    let inp;
    if(f.readonly){
      inp=`<input id="f-${f.key}" type="text" value="${val||''}" readonly style="background:#f5f5f5">`;
    } else if(f.type==='file'){
      // 编辑时不显示文件上传
      if(isEdit){return;}
      inp=`<input id="f-${f.key}" type="file" accept="${f.accept||''}">`;
    } else if(f.type==='textarea'){
      inp=`<textarea id="f-${f.key}">${val||''}</textarea>`;
    } else if(f.type==='select'){
      let extra='';
      if(page==='persons'&&f.key==='isManager')extra=' onchange="toggleManagerJob()"';
      if(page==='logistics'&&f.key==='isPublic')extra=' onchange="toggleOwner()"';
      if(page==='events'&&f.key==='startTime')extra=' onchange="syncEndTimeMin()"';
      inp=`<select id="f-${f.key}"${extra}>${f.options.map(o=>`<option value="${o.v}" ${String(val)==String(o.v)?'selected':''}>${o.t}</option>`).join('')}</select>`;
    } else {
      inp=`<input id="f-${f.key}" type="${f.type||'text'}" value="${val||''}" ${f.required?'required':''}>`;
    }
    rows.push({key:f.key,label:f.label+(f.required?' *':''),html:inp});
  });
  rows.forEach((r,i)=>{
    if(i%2===0)html+='<div class="form-row">';
    html+=`<div class="form-group" id="fg-${r.key}"><label>${r.label}</label>${r.html}</div>`;
    if(i%2===1||i===rows.length-1)html+='</div>';
  });
  html+=`</form><div class="form-actions">
    <button class="btn-cancel" onclick="closeModal()">取消</button>
    <button class="btn-green" onclick="submitForm('${page}','${isEdit?data[flds[0].key]:''}')">${isEdit?'保存':'创建'}</button>
  </div>`;
  openModal(html);
  // 激活联动（innerHTML 已写入，DOM 可用）
  if(toggleAfterOpen){const fn=window[toggleAfterOpen];if(fn)setTimeout(fn,0);}
}

async function submitForm(page,id){
  const flds=fields[page];
  const body={};
  const formData=new FormData();
  let hasFile=false,valid=true;
  const intKeys=['gender','campus','section','job','isManager','managerJob','isMaster','isTotal','isPublic','year','month','date'];
  flds.forEach(f=>{
    const el=document.getElementById('f-'+f.key);
    if(!el||f.readonly)return;
    // 跳过被隐藏的字段（如私有物品所属人）
    if(el.closest && el.closest('.form-group') && el.closest('.form-group').style.display==='none')return;
    if(f.type==='file'){
      if(el.files&&el.files[0]){formData.append(f.key,el.files[0]);hasFile=true;}
      return;
    }
    const val=el.value;
    if(f.required&&!val){valid=false;return}
    if(intKeys.includes(f.key))body[f.key]=parseInt(val||0);
    else if(f.type==='number')body[f.key]=val?parseInt(val):null;
    else body[f.key]=val||null;
  });
  if(!valid){showToast('请填写所有必填项','error');return;}
  // 非管理人员强制管理职责=0
  if(body.isManager===0)body.managerJob=0;
  // 活动起止时间校验
  if(page==='events' && body.startTime && body.endTime && body.startTime >= body.endTime){
    showToast('起始时间必须早于结束时间','error');return;
  }

  const isEdit=!!id;
  try{
    // 文件上传走 FormData
    if(hasFile){
      Object.entries(body).forEach(([k,v])=>formData.append(k,v));
      const res=await fetch(API+'/'+page+'/upload',{method:'POST',body:formData});
      const data=await res.json();
      if(!data.success){showToast(data.message,'error');return;}
    } else if(isEdit){
      const res=await api('/'+page+'/'+id,{method:'PUT',body:JSON.stringify(body)});
      if(!res.success){showToast(res.message,'error');return;}
    } else {
      const res=await api('/'+page,{method:'POST',body:JSON.stringify(body)});
      if(!res.success){showToast(res.message,'error');return;}
    }
    showToast(isEdit?'更新成功':'创建成功');
    closeModal();
    loadPage(page);
  }catch(e){showToast('操作失败','error')}
}

async function delRow(page,id){
  if(!confirm('确认删除该记录？'))return;
  const res=await api('/'+page+'/'+id,{method:'DELETE'});
  if(res.success){showToast('已删除');loadPage(page)}
  else showToast(res.message,'error');
}

// Init
loadPage('persons');
