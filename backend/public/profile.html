<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人信息 - 乐团管理平台</title>
<link rel="stylesheet" href="/css/shared.css">
<link rel="stylesheet" href="/cropper.min.css">
</head>
<body>
<div id="app">
<div class="header">
  <button class="menu-btn" onclick="toggleSidebar()">☰</button>
  <h1>🎵 乐团管理平台</h1>
  <span class="env">Orchestra v1.0</span>
  <div class="header-right">
    <div class="user-name" id="headerUser">
      <img id="avatarThumb" src="" style="width:32px;height:32px;border-radius:50%;object-fit:cover;background:#eee;vertical-align:middle">
      <div class="dropdown">
        <div style="padding:12px 16px;border-bottom:1px solid #eee">
          <div id="dropName" style="font-weight:600;font-size:14px"></div>
          <div id="dropId" style="font-size:12px;color:#999;margin-top:2px"></div>
        </div>
        <a href="/my-registrations">📋 我的报名</a>
        <a href="/profile">👤 个人信息</a>
        <a onclick="logout()">🚪 退出登录</a>
      </div>
    </div>
  </div>
</div>
<div class="container">
  <nav class="sidebar">
    <a href="/home">🏠 首页</a>
    <a href="/persons">👤 成员管理</a>
    <a href="/events">📅 活动管理</a>
    <a href="/attendance">📋 出勤管理</a>
    <a href="/my-registrations">📋 我的报名</a>
    <a href="/scores">🎼 乐谱管理</a>
    <a href="/logistics">📦 后勤管理</a>
    <a href="/articles">📰 文章管理</a>
    <a href="/profile" class="active">👤 个人信息</a>
  </nav>
  <div class="main" id="main-content">
    <div id="page-profile" class="page active"></div>
  </div>
</div>
</div>
<!-- 裁剪弹窗 -->
<div id="cropModal" class="crop-overlay">
  <div class="crop-box">
    <div class="crop-area"><img id="cropImage" src=""></div>
    <div class="crop-actions">
      <button class="btn-cancel" onclick="closeCrop()">取消</button>
      <button class="btn-green" onclick="confirmCrop()">✅ 确认裁剪</button>
    </div>
  </div>
</div>
<!-- 模态框 -->
<div id="modal" class="modal-overlay"><div class="modal" id="modalBody"></div></div>
<div id="toast"></div>
<script src="/js/shared/constants.js"></script>
<script src="/js/shared/utils.js"></script>
<script src="/js/shared/auth.js"></script>
<script src="/js/pages/profile.js"></script>
<script src="/cropper.min.js"></script>
</body>
</html>
